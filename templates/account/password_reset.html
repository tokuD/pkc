{% extends '_base.html' %}


{% block title %}
  パスワード再設定
{% endblock title %}



{% block content %}
  <form action="" method="post">
    {% csrf_token %}
    {% for error in form.non_field_errors %}
      <p><small class="text-danger">{{ error }}</small></p>
    {% endfor %}

    {% for error in form.email.errors %}
      <p class="m-0"><small class="text-danger">{{ error }}</small></p>
    {% endfor %}
    <div class="mb-3 form-floating">
      <input type="email" name="email" placeholder="メールアドレス" autocomplete="email" required id="id_email" class="form-control">
      <label for="id_email" class="form-label">メールアドレス</label>
    </div>
    <button type="submit" class="btn btn-primary">パスワードをリセット</button>
  </form>
{% endblock content %}
