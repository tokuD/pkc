{% extends '_base.html' %}


{% block title %}
    参加登録
{% endblock title %}


{% block content %}
    <form action="" method="post">
        {% csrf_token %}
        <div class="mb-3 form-floating">
            <input class="form-control" type="password" id="password" name="password" required placeholder="参加パスワード">
            <label for="password">参加パスワード</label>
        </div>
        <button type="submit" class="btn btn-primary">参加</button>
    </form>
{% endblock content %}
